services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - applications_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: ghcr.io/mladi-pirati/applications-receiver:master-migrator
    restart: "no"
    command: ["bun", "run", "db:migrate"]
    pull_policy: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  app:
    image: ghcr.io/mladi-pirati/applications-receiver:master
    restart: unless-stopped
    init: true
    pull_policy: always
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${ADMIN_HOST}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_DEFAULT_CLIENT_ROLE: ${KEYCLOAK_DEFAULT_CLIENT_ROLE:-user}
      LEGALIZIRAJMO_TURNSTILE_SECRET_KEY: ${LEGALIZIRAJMO_TURNSTILE_SECRET_KEY}
      LEGALIZIRAJMO_TURNSTILE_EXPECTED_HOSTNAME: ${LEGALIZIRAJMO_TURNSTILE_EXPECTED_HOSTNAME}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_HOST: ${ADMIN_HOST}
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/login'').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  applications_db_data:
